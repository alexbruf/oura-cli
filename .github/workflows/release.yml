name: Build & Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - name: Build all targets
        run: |
          bun build src/index.ts --compile --target=bun-darwin-arm64 --outfile oura-darwin-arm64
          bun build src/index.ts --compile --target=bun-darwin-x64 --outfile oura-darwin-x64
          bun build src/index.ts --compile --target=bun-linux-arm64 --outfile oura-linux-arm64
          bun build src/index.ts --compile --target=bun-linux-x64 --outfile oura-linux-x64

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            oura-darwin-arm64
            oura-darwin-x64
            oura-linux-arm64
            oura-linux-x64
